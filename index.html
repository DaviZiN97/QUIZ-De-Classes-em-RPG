<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quiz de classes</title>
</head>
<body>

    <div id="container-principal">
        <header>
            <h1>TESTE DE APTIDÃO</h1>
            <span>Responda da forma mais honesta possível.</span>
            <p>Questão <span id="contagem_questoes">1</span> de 5</p>
        </header>

        <div id="container-perguntas">
            <p id="pergunta">Como você se sente sobre religião?</p>
            <button id="opcao-1">Não me importo</button>
            <button id="opcao-2">Sou religioso(a), mas não tenho costume de ir para igrejas</button>
            <button id="opcao-3">Sou muito religioso(a), já sonhei em ser um papa</button>
            <button id="opcao-4">Sou totalmente um fanático religioso(a) (ateus passem longe)</button>
        </div>

        <button id="proxima-pergunta">Próxima questão</button>


    <div id="resultado-classe">

        <h2>Classe anexada! Sua classe é <span id="tipo-classe"></span></h2>
        <p id="descricao-classe"></p>

    </div>


    </div>






    <script src="script.js"></script>
</body>
</html>
